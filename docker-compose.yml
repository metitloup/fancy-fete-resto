services:
  resto-app:
    build: .
    container_name: resto-app-container
    restart: always
    # Accès direct via http://[IP_DU_DIETPI] (port 80)
    ports:
      - "80:3000"
    volumes:
      - ./db.json:/app/db.json
    # Protection de la carte SD : les fichiers temporaires vont en RAM (tmpfs)
    tmpfs:
      - /tmp
      - /run
    # Forcer root pour éviter les erreurs de permission sur db.json
    user: "root"
    # Limite mémoire pour ne pas étouffer le Raspberry
    deploy:
      resources:
        limits:
          memory: 256M
    # Réduction des logs sur disque
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
