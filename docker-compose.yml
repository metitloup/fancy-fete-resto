services:
  resto-app:
    build: .
    container_name: resto-app-container
    restart: always
    # Accès direct via http://[IP_DU_DIETPI] (port 80)
    ports:
      - "80:3000"
    
    environment:
      - TZ=Europe/Brussels
      - NODE_ENV=production

    volumes:
      # PERSISTANCE : La base de données
      - ./db.json:/app/db.json
      # DYNAMISME : On monte les fichiers pour éviter le rebuild sur le Pi
      - ./public:/app/public
      - ./server.js:/app/server.js
      # Synchronisation horloge avec DietPi
      - /etc/localtime:/etc/localtime:ro

    # Protection de la carte SD (écriture en RAM pour les fichiers temporaires)
    tmpfs:
      - /tmp
      - /run
    
    # Forcer root pour éviter les erreurs de permission sur db.json sur SD Card
    user: "root"

    # Gestion stricte des ressources pour DietPi
    deploy:
      resources:
        limits:
          memory: 256M
    
    # Réduction drastique des logs sur disque (préserve la carte SD)
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
