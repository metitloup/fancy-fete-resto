<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Accueil - Fancy Fête</title>
    <style>
        .panier-item-row { background: #f9f9f9; color: var(--dark); padding: 10px; margin-bottom: 8px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .panier-qty-controls { display: flex; align-items: center; gap: 5px; min-width: 90px; }
        .panier-item-content { flex-grow: 1; line-height: 1.3; }
        .panier-item-content b { font-size: 1.1rem; }
        .flash-bar { padding: 10px; display: flex; gap: 5px; background: #eee; border-radius:10px; margin-bottom:15px; border: 1px solid #ccc; }
        .flash-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="status">🔴 Déconnecté</div>
    <div class="nav-links">
        <a href="/" class="active">🏠 ACCUEIL</a>
        <a href="stats.html" id="link-stats">📊 STATS</a>
        <a href="cuisine.html" id="link-cuisine" class="admin-link" style="display: none;">👨‍🍳 CUISINE</a>
        <a href="admin.html" id="link-admin" class="admin-link" style="display: none; border-color: var(--warning); color: var(--warning);">⚙️ CONFIG</a>
        <a href="aide.html" target="_blank">❓ AIDE</a>
    </div>

    <div class="flash-bar">
        <input type="text" id="msg-cuisine" class="flash-input" placeholder="💬 Message urgent à la cuisine...">
        <button onclick="envoyerFlash()" class="btn-valider" style="width: auto; margin: 0; padding: 0 20px; background: var(--dark); font-size: 0.9rem;">ENVOYER</button>
    </div>

    <div id="notifs"></div>

    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:15px; width:85%; max-width:400px; text-align:center;">
            <h2 id="modal-title"></h2>
            <div id="modal-body" style="text-align:left; background:#f9f9f9; padding:15px; border-radius:8px; margin:15px 0; font-size:1.1rem;"></div>
            <button class="btn-valider" id="btn-confirm-servi">✅ VÉRIFIÉ / SERVI</button>
        </div>
    </div>

    <div class="grid-menus" id="menu-principal"></div>

    <div id="options" style="display:none;" class="section-options">
        <h2 id="titre-sel" style="text-align:center; color:var(--primary); margin-bottom:15px;"></h2>
        <div id="bloc-taille" style="text-align:center; margin-bottom:10px;"></div>
        <div id="bloc-cuisson" style="display:none; text-align:center; margin-bottom:10px;"></div>
        <div id="bloc-acc" style="text-align:center; margin-bottom:10px;"></div>
        <div style="text-align:center; margin:15px 0;">
            <button class="qty-btn-panier" onclick="changeQty(-1)">-</button>
            <b id="qty-val" style="font-size:1.5rem; margin:0 15px;">1</b>
            <button class="qty-btn-panier" onclick="changeQty(1)">+</button>
        </div>
        <input type="text" id="rem" placeholder="⚠️ Remarque / Allergie" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('options').style.display='none'" style="flex:1; padding:15px; border-radius:10px; border:none; background:#ccc; font-weight:bold; cursor:pointer;">ANNULER</button>
            <button class="btn-valider" style="flex:2;" onclick="ajouter()">+ AJOUTER AU PLATEAU</button>
        </div>
    </div>

    <div class="panier-container">
        <h3 style="margin-top:0;">Plateau en cours</h3>
        <div id="liste-panier" style="margin-bottom:15px;"></div>
        <p style="font-weight:bold; color:var(--dark); margin-bottom:5px;">Table / Plateau :</p>
        <div class="grid-16" id="grid-table"></div>
        <button id="btn-final" class="btn-valider" onclick="valider()">ENVOYER EN CUISINE 🚀</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let config = {}, panier = [], currentQty = 1, numPlateau = null, opt = {};
        const iconDict = { "N/A": "" };

        async function init() {
            const res = await fetch('plats.json');
            config = await res.json();
            config.plats.forEach(p => iconDict[p.id] = p.icon);
            config.options.tailles.forEach(t => iconDict[t.id] = t.icon);
            config.options.cuissons.forEach(c => iconDict[c.id] = c.icon);
            config.options.accompagnements.forEach(a => iconDict[a.id] = a.icon);

            document.getElementById('menu-principal').innerHTML = config.plats.map(p => `
                <button class="btn-main" onclick="sel('${p.id}')" style="border-bottom: 5px solid ${p.couleur}">
                    <span style="display:block; font-size:2rem;">${p.icon}</span> ${p.nom}
                </button>`).join('');

            document.getElementById('bloc-taille').innerHTML = config.options.tailles.map(t => `<button id="b-${t.id}" class="btn-opt" onclick="setT('${t.id}')">${t.icon} ${t.nom}</button>`).join('');
            document.getElementById('bloc-cuisson').innerHTML = `<p style="font-size:0.8rem; font-weight:bold; margin:5px 0;">CUISSON :</p>` + config.options.cuissons.map(c => `<button id="b-${c.id}" class="btn-opt" onclick="setO('c','${c.id}')">${c.icon} ${c.nom}</button>`).join('');
            document.getElementById('bloc-acc').innerHTML = `<p style="font-size:0.8rem; font-weight:bold; margin:5px 0;">ACCOMPAGNEMENT :</p>` + config.options.accompagnements.map(a => `<button id="b-${a.id}" class="btn-opt" onclick="setO('a','${a.id}')">${a.icon} ${a.nom}</button>`).join('');
            document.getElementById('grid-table').innerHTML = Array.from({length: 16}, (_, i) => i + 1).map(n => `<button id="table-${n}" class="btn-num" onclick="setTable(${n})">${n}</button>`).join('');

            fetch('/whoami').then(r => r.json()).then(d => {
                if(d.user === 'admin') {
                    document.getElementById('link-cuisine').style.display = 'inline-block';
                    document.getElementById('link-admin').style.display = 'inline-block';
                }
            });
        }

        // --- SYNCHRONISATION DES ACTIONS ENTRE TABLETTES ---
        socket.on('confirmation_servi', (num) => {
            // 1. Supprimer la bulle de notification sur cet écran
            const bubble = document.getElementById(`notif-${num}`);
            if (bubble) bubble.remove();

            // 2. Si le modal de vérif était ouvert pour CE plateau sur cet écran, on le ferme
            const modal = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title').innerText;
            if (modal.style.display === 'flex' && modalTitle.includes(num)) {
                modal.style.display = 'none';
            }
        });

        socket.on('notification_accueil', (cmd) => {
            const notifs = document.getElementById('notifs');
            const bubble = document.createElement('div');
            bubble.className = 'notif-bubble';
            bubble.id = `notif-${cmd.num}`;
            if (cmd.num === "⚡ EXPRESS") {
                const iconePlat = iconDict[cmd.items[0].p] || '🚀';
                bubble.style.background = "var(--express)";
                bubble.innerHTML = `${iconePlat} EXPRESS PRÊT !`;
                bubble.onclick = () => { socket.emit('confirmation_servi', cmd.num); bubble.remove(); };
            } else {
                bubble.innerHTML = `🔔 PLATEAU ${cmd.num} PRÊT !`;
                bubble.onclick = () => ouvrirVerif(cmd);
            }
            notifs.appendChild(bubble);
        });

        function ouvrirVerif(cmd) {
            document.getElementById('modal-title').innerText = `Vérif Plateau n°${cmd.num}`;
            document.getElementById('modal-body').innerHTML = cmd.items.map(i => `
                <div style="margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <b>${i.qty}x ${iconDict[i.p] || ''} ${i.p}</b><br>
                    <small>${iconDict[i.t] || ''} ${i.t} ${i.c !== 'N/A' ? '• '+ (iconDict[i.c]||'') + ' ' + i.c : ''} ${i.a !== 'N/A' ? '• '+ (iconDict[i.a]||'') + ' ' + i.a : ''}</small>
                    ${i.rem ? `<div style="color:var(--danger); font-weight:bold; font-size:0.9rem; margin-top:3px;">⚠️ ${i.rem.toUpperCase()}</div>` : ''}
                </div>`).join('');
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('btn-confirm-servi').onclick = () => {
                socket.emit('confirmation_servi', cmd.num);
                document.getElementById('modal-overlay').style.display = 'none';
                const b = document.getElementById(`notif-${cmd.num}`);
                if(b) b.remove();
            };
        }

        function renderPanier() {
            const cont = document.getElementById('liste-panier');
            if(!panier.length) { cont.innerHTML = "<small style='color:gray'>Plateau vide...</small>"; return; }
            cont.innerHTML = panier.map((i, idx) => `
                <div class="panier-item-row">
                    <div class="panier-qty-controls">
                        <button class="qty-btn-panier" onclick="modifQtyPanier(${idx},-1)">-</button>
                        <b style="width:25px; text-align:center;">${i.qty}</b>
                        <button class="qty-btn-panier" onclick="modifQtyPanier(${idx},1)">+</button>
                    </div>
                    <div class="panier-item-content">
                        <b>${iconDict[i.p] || ''} ${i.p}</b><br>
                        <small style="color:#666;">${iconDict[i.t] || ''} ${i.t} ${i.c !== 'N/A' ? ' • '+(iconDict[i.c]||'')+' '+i.c : ''} ${i.a !== 'N/A' ? ' • '+(iconDict[i.a]||'')+' '+i.a : ''}</small>
                        ${i.rem ? `<div style="color:var(--danger); font-weight:bold; font-size:0.75rem; margin-top:2px;">⚠️ ${i.rem.toUpperCase()}</div>` : ''}
                    </div>
                    <button onclick="panier.splice(${idx},1); renderPanier()" style="background:none; border:none; cursor:pointer; font-size:1.2rem; padding:0 5px;">❌</button>
                </div>`).join('');
        }

        function modifQtyPanier(idx, delta) { panier[idx].qty = Math.max(1, panier[idx].qty + delta); renderPanier(); }
        function envoyerFlash() {
            const msg = document.getElementById('msg-cuisine').value;
            if(msg.trim()) { socket.emit('envoyer_flash_cuisine', msg); document.getElementById('msg-cuisine').value = ''; alert("Message envoyé !"); }
        }
        function sel(id) {
            const plat = config.plats.find(p => p.id === id);
            opt = { p: plat.id, c: (plat.hasCuisson ? 'Apoint' : 'N/A'), a: plat.forcedAcc ? plat.forcedAcc : (plat.hasAcc ? 'Crudités' : 'N/A'), t: (plat.hasTaille ? 'Adulte' : 'N/A') };
            document.getElementById('titre-sel').innerText = plat.nom;
            document.getElementById('options').style.display = 'block';
            document.getElementById('bloc-cuisson').style.display = plat.hasCuisson ? 'block' : 'none';
            document.getElementById('bloc-taille').style.display = plat.hasTaille ? 'block' : 'none';
            document.getElementById('bloc-acc').style.display = (plat.hasAcc && !plat.forcedAcc) ? 'block' : 'none';
            updateUI();
        }
        function setT(t) { opt.t = t; updateUI(); }
        function setO(k,v) { opt[k] = v; updateUI(); }
        function setTable(n) { numPlateau = n; document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('selected')); document.getElementById('table-'+n).classList.add('selected'); }
        function changeQty(v) { currentQty = Math.max(1, currentQty + v); document.getElementById('qty-val').innerText = currentQty; }
        function updateUI() { document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active')); [opt.t, opt.c, opt.a].forEach(id => { const btn = document.getElementById('b-' + id); if(btn) btn.classList.add('active'); }); }
        function ajouter() { panier.push({ ...opt, qty: currentQty, rem: document.getElementById('rem').value }); document.getElementById('options').style.display = 'none'; document.getElementById('rem').value = ''; currentQty = 1; document.getElementById('qty-val').innerText = "1"; renderPanier(); }
        function valider() {
            const isFullExpress = panier.every(item => config.plats.find(p => p.id === item.p)?.isExpress);
            let numEnvoye = isFullExpress ? "⚡ EXPRESS" : numPlateau;
            if(!numEnvoye && !isFullExpress) return alert("Choisissez un numéro de table !");
            if(!panier.length) return alert("Panier vide !");
            socket.emit('nouvelle_commande', { num: numEnvoye, items: panier });
            panier = []; numPlateau = null; document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('selected')); renderPanier();
        }
        socket.on('connect', () => { document.getElementById('status').innerText = "🟢 Connecté"; });
        socket.on('maj_plateaux', (occupes) => {
            document.querySelectorAll('.btn-num').forEach(btn => {
                const n = parseInt(btn.innerText);
                btn.style.background = occupes.includes(n) ? "#ffcccc" : "#fdfdfd";
            });
        });
        window.onload = init;
    </script>
</body>
</html>
